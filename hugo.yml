baseURL: 'https://devtechblog.ru/'
title: DevTechBlog
theme: PaperMod
languageName: "ru"
defaultContentLanguage: "ru"
enableGitInfo: false

enableRobotsTXT: false
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: DevTechBlog
  description: "DevTechBlog"
  keywords: [Blog]
  author: AronMav   
  # author: ["Me", "You"] # multiple authors
  images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "2 January 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  UseHugoToc: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableFingerprinting: true
    favicon: /favicon/favicon.ico
    favicon16x16: /favicon/favicon-16x16.png
    favicon32x32: /favicon/favicon-32x32.png
    apple_touch_icon: /favicon/apple-touch-icon.png
    safari_pinned_tab: /favicon/safari-pinned-tab.svg

  label:
    text: "DevTechBlog"
    icon: /favicon/apple-touch-icon.png
    iconHeight: 35
    collor: #ffa500

  # profile-mode
  # profileMode:
  #   enabled: false # needs to be explicitly set
  #   title: DevTechBlog
  #   subtitle: "This is subtitle"
  #   imageUrl: "<img location>"
  #   imageWidth: 120
  #   imageHeight: 120
  #   imageTitle: my image
  #   buttons:
  #     - name: Posts
  #       url: posts
  #     - name: Tags
  #       url: tags

  # home-info mode
  homeInfoParams:
    Title: "Привет, друг!"
    Content: "
    Меня зовут Мерзляков Андрей (AronMav).\n\n 
    Обо мне:\n\n 
    -- 1C Senior Developer and Tech-Architect;\n\n 
    -- 1C Expert (CS70323);\n\n 
    -- Rust Junior Developmer.\n\n 
    И это мой Блог."

  socialIcons:
    - name: telegram
      url: "https://t.me/AronMav"
    - name: github
      url: "https://github.com/aronmav"
    - name: linkedin
      url: "https://www.linkedin.com/in/aronmav"
    - name: 1С
      url: "https://uc1.1c.ru/account/summary/?token=d11a904404d3d85f64470015a4348b47"

  analytics:
  #   google:
  #     SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "102638634"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: Search
      name: Search
      url: /search/
      weight: 10
    - identifier: Tags
      name: Tags
      url: /tags/
      weight: 20
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    # anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: false
    # noClasses: false
    style: catppuccin-frappe